<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易智行 8.5 · 曾仕强时位推演</title>
    <style>
        :root { --paper: #f4f1ea; --ink: #2c2c2c; --gold: #b89b5e; --red: #a22d2d; --jade: #3a5a40; }
        body { background-color: #1a1a1a; color: var(--ink); font-family: 'STKaiti', 'KaiTi', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; text-align: center; padding: 25px 0; border-bottom: 1px solid var(--gold); background: #1a1a1a; }
        header h1 { color: var(--gold); letter-spacing: 6px; margin: 0; font-size: 1.4rem; }
        .container { width: 92%; max-width: 500px; padding: 20px 0 100px; }
        
        /* 起卦区 */
        .gua-stage { background: #000; padding: 25px; border-radius: 8px; display: flex; flex-direction: column-reverse; gap: 12px; margin-bottom: 20px; border: 2px solid #333; }
        .yao-row { height: 16px; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .yao-label { position: absolute; left: -45px; font-size: 0.75rem; color: #777; width: 40px; }
        .line-body { height: 100%; border-radius: 2px; transition: 0.4s; }
        .yang { width: 100%; background: var(--gold); }
        .yin { width: 100%; display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 44%; height: 100%; background: #444; }
        .moving::after { content: "✕"; position: absolute; right: -30px; color: var(--red); font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 14px; border: 1px solid var(--gold); background: transparent; color: var(--gold); border-radius: 4px; font-family: inherit; cursor: pointer; }
        .prime { grid-column: span 2; background: var(--gold); color: #000; font-weight: bold; border: none; }

        /* 结果解析卷轴 */
        #result-area { display: none; width: 100%; margin-top: 20px; }
        .paper-scroll { background-color: var(--paper); background-image: radial-gradient(#dcd7c9 1.2px, transparent 1.2px); background-size: 20px 20px; padding: 25px; border: 1px solid #dcd7c9; box-shadow: 0 15px 40px rgba(0,0,0,0.6); position: relative; }
        .scroll-header { border-bottom: 2px solid var(--ink); margin-bottom: 20px; text-align: center; }
        .scroll-header h2 { margin: 0; font-size: 1.8rem; color: var(--red); letter-spacing: 4px; }

        /* 阶层点击区样式 */
        .stage-selector { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        .stage-selector h4 { margin: 0 0 10px 0; color: var(--ink); font-size: 0.95rem; }
        .yao-tabs { display: flex; justify-content: space-between; gap: 5px; }
        .tab { flex: 1; padding: 8px 2px; background: #ddd; border-radius: 4px; font-size: 0.75rem; text-align: center; cursor: pointer; }
        .tab.active { background: var(--gold); color: white; }

        /* 动态详细建议 */
        .detail-box { background: white; padding: 15px; border: 1px solid #ccc; border-radius: 8px; min-height: 100px; transition: 0.3s; }
        .detail-box b { display: block; color: var(--red); margin-bottom: 8px; font-size: 1rem; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .detail-box p { margin: 0; line-height: 1.6; font-size: 0.95rem; text-align: justify; }

        .action-card { border: 2px solid var(--jade); background: #fff; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .action-card strong { color: var(--jade); display: block; border-bottom: 1px solid var(--jade); margin-bottom: 8px; }
    </style>
</head>
<body>

<header><h1>易智行 · 时位推演</h1></header>

<div class="container">
    <div style="background:rgba(255,255,255,0.05); border:1px solid var(--gold); padding:10px; margin-bottom:20px; text-align:center;">
        <input type="text" id="question" placeholder="输入困惑：如‘职业发展、近期投资’" style="width:90%; background:transparent; border:none; color:var(--gold); font-size:1.1rem; outline:none; text-align:center;">
    </div>

    <div class="gua-stage" id="stage"></div>

    <div class="btn-grid">
        <button onclick="addYao(1)">⚊ 记阳爻 (九)</button>
        <button onclick="addYao(0)">⚋ 记阴爻 (六)</button>
        <button onclick="markMoving()" style="grid-column: span 2;">标记最后一位为“变爻”</button>
        <button onclick="clearAll()">焚香重起</button>
        <button class="prime" onclick="solve()">开启时位深度推演</button>
    </div>

    <div id="result-area">
        <div class="paper-scroll">
            <div class="scroll-header">
                <h2 id="r-name">卦名</h2>
                <div id="r-sub" style="font-size: 0.8rem; margin-top:5px; color:#555;"></div>
            </div>

            <!-- 维度：阶层选择器 -->
            <div class="stage-selector">
                <h4>【身份定位】点击选择你当前的处境：</h4>
                <div class="yao-tabs">
                    <div class="tab" onclick="selectStage(0)">初阶</div>
                    <div class="tab" onclick="selectStage(1)">二阶</div>
                    <div class="tab" onclick="selectStage(2)">三阶</div>
                    <div class="tab" onclick="selectStage(3)">四阶</div>
                    <div class="tab" onclick="selectStage(4)">五阶</div>
                    <div class="tab" onclick="selectStage(5)">顶阶</div>
                </div>
            </div>

            <div class="detail-box" id="stage-detail">
                <p style="color:#888;">请点击上方“阶层”按钮，查看曾教授对该位置的实战锦囊...</p>
            </div>

            <div class="action-card">
                <strong id="act-title">本卦核心建议</strong>
                <div id="r-action" style="line-height:1.8; font-size:0.95rem;"></div>
            </div>

            <div style="text-align: center; margin-top: 25px; font-size: 0.8rem; color: #999;">
                “位子找对了，怎么做都顺。” —— 曾仕强
            </div>
        </div>
    </div>
</div>

<script>
    let gua = [];
    const TRI_MAP = {"111":"乾","000":"坤","100":"震","011":"巽","010":"坎","101":"离","001":"艮","110":"兑"};
    
    // 曾仕强 6 阶层通用智慧引擎
    const STAGE_WISDOM = [
        {title: "初阶（潜伏期）", advice: "曾师锦囊：‘潜龙勿用’。你现在刚起步或刚入局。别急着表现，多干活少说话。观察环境的潜规则，把根扎深。在这个位子上，‘不动’就是最大的动。"},
        {title: "二阶（成长现形期）", advice: "曾师锦囊：‘见龙在田’。你已经小有成就，大家开始注意到你了。这时候最重要是‘利见大人’——找个好上司，找个导师。这个位子靠自己很难，要靠借力。"},
        {title: "三阶（危险跨越期）", advice: "曾师锦囊：‘夕惕若厉’。你到了基层和中层的交界处，最忙、最累、压力最大。曾教授提醒你：一定要半夜反省自己有没有做错。别太狂，一狂就掉下去了。"},
        {title: "四阶（高层决策期）", advice: "曾师锦囊：‘或跃在渊’。你已经进入决策圈，半步天堂半步地狱。现在要看准时机，要么往上一跃成为核心，要么退守深渊。在这个位子，跟对人比做对事更重要。"},
        {title: "五阶（圆满主宰期）", advice: "曾师锦囊：‘飞龙在天’。这是人生的巅峰。曾教授教导：到了这个位子，不能只顾自己爽，要懂得分配利益。如果自私自利，马上就会转向‘亢龙有悔’。"},
        {title: "顶阶（顾问退出期）", advice: "曾师锦囊：‘亢龙有悔’。你到了该退的时候了。别再抓着权力不放，要把舞台留给年轻人。曾教授说，这种时候‘退’就是‘进’。优雅的转身，才是大智慧。"}
    ];

    function addYao(t) { if(gua.length < 6) { gua.push({t, m: false}); render(); } }
    function markMoving() { if(gua.length > 0) { gua[gua.length-1].m = !gua[gua.length-1].m; render(); } }
    function clearAll() { gua = []; render(); document.getElementById('result-area').style.display = 'none'; }

    function render() {
        const stage = document.getElementById('stage'); stage.innerHTML = '';
        const labels = ["初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];
        gua.forEach((y, i) => {
            const row = document.createElement('div');
            row.className = `yao-row ${y.m ? 'moving' : ''}`;
            row.innerHTML = `<div class="yao-label">${labels[i]}</div><div class="line-body ${y.t===1?'yang':'yin'}"></div>`;
            stage.appendChild(row);
        });
    }

    function selectStage(idx) {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, i) => t.className = i === idx ? 'tab active' : 'tab');
        
        const info = STAGE_WISDOM[idx];
        const box = document.getElementById('stage-detail');
        box.innerHTML = `<b>${info.title}</b><p>${info.advice}</p>`;
    }

    function solve() {
        if(gua.length < 6) return;
        const bCode = gua.map(y => y.t).join(''), low = TRI_MAP[bCode.substring(0,3)], up = TRI_MAP[bCode.substring(3,6)];
        
        const gName = (up === low) ? up+"为天" : up+low+"卦";
        document.getElementById('r-name').innerText = gName;
        document.getElementById('r-sub').innerText = `格局：${up}在上 / ${low}在下 | 这是一个“时位”转换的关键期`;

        // 根据是否有动爻自动建议
        const moveIdx = gua.findIndex(y => y.m);
        if(moveIdx !== -1) {
            selectStage(moveIdx); // 自动选中动爻位置
            document.getElementById('act-title').innerText = "【动爻特别提醒】";
            document.getElementById('r-action').innerText = `你现在的变数在第 ${moveIdx+1} 爻。曾教授语：‘动则变’。说明你正处于阶层跨越的关键点，请务必阅读上方 ${moveIdx+1} 阶的建议。`;
        } else {
            selectStage(0); // 默认选中初爻
            document.getElementById('act-title').innerText = "整体实战建议";
            document.getElementById('r-action').innerHTML = `• 保持现状，不要盲目跳槽或投资。<br>• 现阶段的核心任务是“守正”，即做符合你身份的事。<br>• 仔细研究上方的六个阶层，看看你离下一阶还差什么。`;
        }

        document.getElementById('result-area').style.display = 'block';
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }
</script>
</body>
</html>
