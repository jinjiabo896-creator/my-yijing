<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易智行 8.1 · 曾仕强智慧精舍</title>
    <style>
        :root {
            --paper: #f4f1ea; /* 宣纸米黄 */
            --ink: #2c2c2c;   /* 墨色 */
            --gold: #b89b5e;  /* 琥珀金 */
            --red: #a22d2d;   /* 印泥红 */
            --jade: #3a5a40;  /* 苍松绿 */
        }

        body {
            background-color: #1a1a1a; 
            color: var(--ink);
            font-family: 'STKaiti', 'KaiTi', 'PingFang SC', serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; text-align: center; padding: 30px 0;
            background: linear-gradient(to bottom, #252525, #1a1a1a);
            border-bottom: 1px solid var(--gold);
        }
        header h1 { color: var(--gold); letter-spacing: 8px; margin: 0; font-size: 1.6rem; }

        .container { width: 92%; max-width: 500px; padding: 20px 0 100px; }

        .q-input {
            border: 1px solid var(--gold); padding: 12px; margin-bottom: 25px;
            background: rgba(255,255,255,0.05); border-radius: 4px;
        }
        .q-input input {
            width: 100%; background: transparent; border: none; color: var(--gold);
            font-size: 1.1rem; text-align: center; outline: none; font-family: inherit;
        }

        /* 卦象区 - 黑色托盘 */
        .gua-stage {
            background: #000; border: 2px solid #333; border-radius: 8px;
            display: flex; flex-direction: column-reverse; gap: 12px;
            padding: 30px; margin-bottom: 25px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .yao-row { height: 16px; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .yao-label { position: absolute; left: -45px; font-size: 0.75rem; color: #777; width: 40px; }
        .line-body { height: 100%; border-radius: 2px; transition: 0.4s; }
        .yang { width: 100%; background: var(--gold); box-shadow: 0 0 8px rgba(184,155,94,0.4); }
        .yin { width: 100%; display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 44%; height: 100%; background: #444; border-radius: 2px; }
        
        .moving::after { 
            content: "✕"; position: absolute; right: -30px; color: var(--red); 
            font-weight: bold; animation: pulse 1s infinite;
        }
        @keyframes pulse { 50% { opacity: 0.3; } }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button {
            padding: 14px; border: 1px solid var(--gold); background: transparent; color: var(--gold);
            font-family: inherit; font-size: 0.95rem; cursor: pointer; border-radius: 4px;
        }
        .prime { 
            grid-column: span 2; background: var(--gold); color: #000; font-weight: bold; 
            border: none; margin-top: 10px; font-size: 1.1rem;
        }

        /* 核心解析区 - 宣纸质感 */
        #result-area { display: none; margin-top: 30px; width: 100%; }
        .paper-scroll {
            background-color: var(--paper);
            background-image: radial-gradient(#dcd7c9 1.2px, transparent 1.2px);
            background-size: 20px 20px;
            padding: 30px 25px; border-radius: 2px; border: 1px solid #dcd7c9;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative;
        }

        .seal {
            position: absolute; top: 20px; right: 20px; width: 55px; height: 55px;
            border: 2px solid var(--red); color: var(--red); font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; transform: rotate(12deg); font-weight: bold;
            opacity: 0.7; border-radius: 2px; line-height: 1.2;
        }

        .scroll-header { border-bottom: 2px solid var(--ink); margin-bottom: 25px; text-align: center; }
        .scroll-header h2 { margin: 0; font-size: 2rem; color: var(--red); letter-spacing: 5px; }

        /* 三才分析网格 */
        .sancai-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .sancai-card { 
            background: rgba(0,0,0,0.04); border: 1px solid #ccc; padding: 12px 5px; 
            text-align: center; border-radius: 4px;
        }
        .sancai-card b { display: block; font-size: 0.8rem; color: #666; margin-bottom: 5px; }
        .sancai-card span { font-size: 1rem; font-weight: bold; color: var(--ink); }

        .wisdom-section { margin-bottom: 25px; }
        .wisdom-section h4 { 
            background: var(--ink); color: var(--paper); display: inline-block;
            padding: 2px 12px; font-size: 0.9rem; margin-bottom: 12px;
        }
        .wisdom-section p { margin: 0; line-height: 1.8; text-align: justify; color: #333; font-size: 1.05rem; }

        .action-box {
            border: 2px solid var(--jade); background: #fff;
            padding: 20px; border-radius: 8px; margin-top: 10px;
        }
        .action-box strong { color: var(--jade); display: block; border-bottom: 1px solid var(--jade); margin-bottom: 10px; font-size: 1.1rem; }

        footer { text-align: center; color: #555; font-size: 0.8rem; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>易智行 · 智慧精舍</h1>
</header>

<div class="container">
    <div class="q-input">
        <input type="text" id="question" placeholder="诚心默念疑惑，在此落笔">
    </div>

    <div class="gua-stage" id="stage"></div>

    <div class="btn-grid">
        <button onclick="addYao(1)">⚊ 记阳爻</button>
        <button onclick="addYao(0)">⚋ 记阴爻</button>
        <button onclick="markMoving()" style="grid-column: span 2;">标记此爻为“变爻” (动则思变)</button>
        <button onclick="clearAll()">焚香重起</button>
        <button class="prime" onclick="solve()">深 度 智 慧 推 演</button>
    </div>

    <div id="result-area">
        <div class="paper-scroll">
            <div class="seal">曾氏<br>智慧印</div>
            <div class="scroll-header">
                <h2 id="r-name">卦名</h2>
                <div id="r-sub" style="font-size: 0.9rem; margin-top:8px; color:#555; font-weight:bold;"></div>
            </div>

            <!-- 维度：三才观分析 -->
            <div class="sancai-grid">
                <div class="sancai-card"><b>天时(5,6爻)</b><span id="sc-t"></span></div>
                <div class="sancai-card"><b>人事(3,4爻)</b><span id="sc-p"></span></div>
                <div class="sancai-card"><b>地基(1,2爻)</b><span id="sc-g"></span></div>
            </div>

            <div class="wisdom-section" id="r-bian-box" style="display:none;">
                <h4 style="background: var(--red);">【趋势演变】</h4>
                <p id="r-bian-text" style="color: var(--red); font-weight: bold;"></p>
            </div>

            <div class="wisdom-section">
                <h4>【曾师实战解析】</h4>
                <p id="r-zeng"></p>
            </div>

            <div class="action-box">
                <strong>今日行动建议</strong>
                <div id="r-action" style="font-size: 1rem; line-height: 2;"></div>
            </div>
        </div>
    </div>
</div>

<footer>—— 持经达变 · 顺天应人 ——</footer>

<script>
    let gua = [];
    const TRI_MAP = {
        "111": {n: "乾", e: "天", k: "刚健"}, "000": {n: "坤", e: "地", k: "厚德"},
        "100": {n: "震", e: "雷", k: "奋发"}, "011": {n: "巽", e: "风", k: "渗透"},
        "010": {n: "坎", e: "水", k: "守信"}, "101": {n: "离", e: "火", k: "明亮"},
        "001": {n: "艮", e: "山", k: "稳重"}, "110": {n: "兑", e: "泽", k: "喜悦"}
    };

    function addYao(t) { if(gua.length < 6) { gua.push({t, m: false}); render(); } }
    function markMoving() { if(gua.length > 0) { gua[gua.length-1].m = !gua[gua.length-1].m; render(); } }
    function clearAll() { gua = []; render(); document.getElementById('result-area').style.display = 'none'; }

    function render() {
        const stage = document.getElementById('stage'); stage.innerHTML = '';
        const labels = ["初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];
        gua.forEach((y, i) => {
            const row = document.createElement('div');
            row.className = `yao-row ${y.m ? 'moving' : ''}`;
            row.innerHTML = `<div class="yao-label">${labels[i]}</div><div class="line-body ${y.t===1?'yang':'yin'}"></div>`;
            stage.appendChild(row);
        });
    }

    function getGInfo(code) {
        const low = TRI_MAP[code.substring(0,3)], up = TRI_MAP[code.substring(3,6)];
        const special = {"乾乾":"乾为天","坤坤":"坤为地","坤兑":"地泽临","乾坤":"天地否","坤乾":"地天泰","坎离":"水火既济","离坎":"火水未济"};
        return { name: special[up.n+low.n] || (up.n+low.n+"卦"), up, low };
    }

    function solve() {
        if(gua.length < 6) return;
        const q = document.getElementById('question').value || "日常修行";
        const bCode = gua.map(y => y.t).join(''), ben = getGInfo(bCode);
        const zCode = gua.map(y => y.m ? 1-y.t : y.t).join(''), zhi = getGInfo(zCode);

        // 结果基础信息
        document.getElementById('r-name').innerText = ben.name;
        document.getElementById('r-sub').innerText = `${ben.up.e}上 / ${ben.low.e}下 | 性质：${ben.up.k} + ${ben.low.k}`;
        
        // 维度：三才分析逻辑
        document.getElementById('sc-g').innerText = (gua[0].t + gua[1].t >= 1) ? "根基扎实" : "根基尚虚";
        document.getElementById('sc-p').innerText = (gua[2].t + gua[3].t >= 1) ? "人事积极" : "人事被动";
        document.getElementById('sc-t').innerText = (gua[4].t + gua[5].t >= 1) ? "时机成熟" : "时机未到";

        // 维度：变卦趋势
        const moveIndices = gua.map((y, i) => y.m ? i+1 : 0).filter(v => v !== 0);
        const bianBox = document.getElementById('r-bian-box');
        if(moveIndices.length > 0) {
            bianBox.style.display = 'block';
            document.getElementById('r-bian-text').innerText = `动爻在第 ${moveIndices.join(', ')} 爻。局势正从【${ben.name}】演变为【${zhi.name}】。意味着现状虽是${ben.up.k}，但最终会导向${zhi.up.k}的结果。`;
        } else {
            bianBox.style.display = 'none';
        }

        // 维度：曾师深度心法 (示例)
        const zengDict = {
            "地泽临": "曾教授常说：‘临’就是大，代表大势所趋。现在你很有影响力，但要记住‘至于八月有凶’。这告诉我们，在最风光的时候要看到阴暗面，这就是忧患意识。",
            "天地否": "曾教授语：‘否（pǐ）卦’说明上下不通。此时你再有本事也没用，要学会‘内文明而外柔顺’，收敛光芒，别去硬碰硬。",
            "乾为天": "曾教授教导：乾卦全是阳爻，你要看你在哪一阶段。潜龙就得憋着，飞龙才能做事。现在最关键的是‘德’要配得上你的‘位’。"
        };
        document.getElementById('r-zeng').innerText = zengDict[ben.name] || "曾教授心法：易经是解忧之书。你要先问自己的‘位’对不对，再看‘时’熟不熟。位对时熟，德行足够，就没有不通的事。";

        // 维度：实战建议
        const actions = {
            "地泽临": ["• 亲自下现场，重要的事别只听汇报。","• 给予下属或伙伴实质性的恩惠。","• 提前为下个季度的变数做准备。"],
            "乾为天": ["• 保持高标准的自我要求，不松懈。","• 寻找能指引你的‘大人’或导师。","• 警惕‘亢龙有悔’，别把话说死、事做绝。"]
        };
        const currentActions = actions[ben.name] || ["• 守住本心，不要被外界纷扰带节奏。","• 换位思考，站在对方的角度看现在的矛盾。","• 简化生活，把最核心的那件事先做好。"];
        document.getElementById('r-action').innerHTML = currentActions.join('<br>');

        document.getElementById('result-area').style.display = 'block';
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }
</script>

</body>
</html>
