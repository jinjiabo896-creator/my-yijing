<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易智行 8.2 · 曾仕强智慧精舍</title>
    <style>
        :root { --paper: #f4f1ea; --ink: #2c2c2c; --gold: #b89b5e; --red: #a22d2d; --jade: #3a5a40; }
        body { background-color: #1a1a1a; color: var(--ink); font-family: 'STKaiti', 'KaiTi', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; text-align: center; padding: 25px 0; background: #1a1a1a; border-bottom: 1px solid var(--gold); }
        header h1 { color: var(--gold); letter-spacing: 8px; margin: 0; font-size: 1.5rem; }
        .container { width: 92%; max-width: 500px; padding: 20px 0 100px; }
        .q-input { border: 1px solid var(--gold); padding: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.05); }
        .q-input input { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 1.1rem; text-align: center; outline: none; }
        .gua-stage { background: #000; border: 2px solid #333; display: flex; flex-direction: column-reverse; gap: 12px; padding: 25px; margin-bottom: 20px; }
        .yao-row { height: 16px; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .yao-label { position: absolute; left: -45px; font-size: 0.75rem; color: #777; width: 40px; }
        .line-body { height: 100%; border-radius: 2px; transition: 0.4s; }
        .yang { width: 100%; background: var(--gold); }
        .yin { width: 100%; display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 44%; height: 100%; background: #444; }
        .moving::after { content: "✕"; position: absolute; right: -30px; color: var(--red); font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; border-radius: 4px; font-family: inherit; }
        .prime { grid-column: span 2; background: var(--gold); color: #000; font-weight: bold; border: none; margin-top: 5px; }
        #result-area { display: none; margin-top: 25px; width: 100%; }
        .paper-scroll { background-color: var(--paper); background-image: radial-gradient(#dcd7c9 1.2px, transparent 1.2px); background-size: 20px 20px; padding: 25px; border: 1px solid #dcd7c9; box-shadow: 0 15px 40px rgba(0,0,0,0.6); position: relative; }
        .seal { position: absolute; top: 15px; right: 15px; width: 50px; height: 50px; border: 2px solid var(--red); color: var(--red); font-size: 11px; display: flex; align-items: center; justify-content: center; text-align: center; transform: rotate(12deg); font-weight: bold; opacity: 0.7; }
        .scroll-header { border-bottom: 2px solid var(--ink); margin-bottom: 20px; text-align: center; }
        .scroll-header h2 { margin: 0; font-size: 1.8rem; color: var(--red); letter-spacing: 4px; }
        .sancai-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .sancai-card { background: rgba(0,0,0,0.04); border: 1px solid #ccc; padding: 10px 5px; text-align: center; border-radius: 4px; }
        .sancai-card b { display: block; font-size: 0.75rem; color: #666; }
        .sancai-card span { font-size: 0.95rem; font-weight: bold; }
        .wisdom-section { margin-bottom: 20px; }
        .wisdom-section h4 { background: var(--ink); color: var(--paper); display: inline-block; padding: 2px 10px; font-size: 0.85rem; margin-bottom: 10px; }
        .wisdom-section p { margin: 0; line-height: 1.8; text-align: justify; color: #333; font-size: 1rem; }
        .action-box { border: 2px solid var(--jade); background: #fff; padding: 15px; border-radius: 8px; }
        .action-box strong { color: var(--jade); display: block; border-bottom: 1px solid var(--jade); margin-bottom: 8px; }
    </style>
</head>
<body>

<header><h1>易智行 · 智慧精舍</h1></header>

<div class="container">
    <div class="q-input"><input type="text" id="question" placeholder="诚心默念疑惑，在此落笔"></div>
    <div class="gua-stage" id="stage"></div>
    <div class="btn-grid">
        <button onclick="addYao(1)">⚊ 记阳爻</button>
        <button onclick="addYao(0)">⚋ 记阴爻</button>
        <button onclick="markMoving()" style="grid-column: span 2;">标记此爻为“变爻”</button>
        <button onclick="clearAll()">重置起卦</button>
        <button class="prime" onclick="solve()">深 度 智 慧 推 演</button>
    </div>
    <div id="result-area">
        <div class="paper-scroll">
            <div class="seal">曾氏<br>智慧印</div>
            <div class="scroll-header"><h2 id="r-name">卦名</h2><div id="r-sub" style="font-size: 0.85rem; margin-top:5px; color:#555;"></div></div>
            <div class="sancai-grid">
                <div class="sancai-card"><b>天时</b><span id="sc-t"></span></div>
                <div class="sancai-card"><b>人事</b><span id="sc-p"></span></div>
                <div class="sancai-card"><b>地基</b><span id="sc-g"></span></div>
            </div>
            <div class="wisdom-section" id="r-bian-box" style="display:none;"><h4 style="background:var(--red);">【动态趋势】</h4><p id="r-bian-text"></p></div>
            <div class="wisdom-section"><h4>【曾师深度推演】</h4><p id="r-zeng"></p></div>
            <div class="action-box"><strong>实战行动建议</strong><div id="r-action"></div></div>
        </div>
    </div>
</div>

<script>
    let gua = [];
    const TRI_MAP = {
        "111": {n:"乾", e:"天", w:"金", k:"刚健", a:"领导"}, "000": {n:"坤", e:"地", w:"土", k:"厚德", a:"配合"},
        "100": {n:"震", e:"雷", w:"木", k:"奋发", a:"行动"}, "011": {n:"巽", e:"风", w:"木", k:"渗透", a:"细节"},
        "010": {n:"坎", e:"水", w:"水", k:"守信", a:"风险控制"}, "101": {n:"离", e:"火", w:"火", k:"明亮", a:"观察"},
        "001": {n:"艮", e:"山", w:"土", k:"稳重", a:"停止"}, "110": {n:"兑", e:"泽", w:"金", k:"喜悦", a:"沟通"}
    };

    const G64_NAMES = {"111111":"乾为天","000000":"坤为地","110101":"火泽睽","000110":"地泽临","111000":"地天泰","000111":"天地否","101010":"水火既济","010101":"火水未济"};

    function addYao(t) { if(gua.length < 6) { gua.push({t, m: false}); render(); } }
    function markMoving() { if(gua.length > 0) { gua[gua.length-1].m = !gua[gua.length-1].m; render(); } }
    function clearAll() { gua = []; render(); document.getElementById('result-area').style.display = 'none'; }

    function render() {
        const stage = document.getElementById('stage'); stage.innerHTML = '';
        gua.forEach((y, i) => {
            const row = document.createElement('div');
            row.className = `yao-row ${y.m ? 'moving' : ''}`;
            row.innerHTML = `<div class="yao-label">${["初爻","二爻","三爻","四爻","五爻","上爻"][i]}</div><div class="line-body ${y.t===1?'yang':'yin'}"></div>`;
            stage.appendChild(row);
        });
    }

    function solve() {
        if(gua.length < 6) return;
        const bCode = gua.map(y => y.t).join(''), low = TRI_MAP[bCode.substring(0,3)], up = TRI_MAP[bCode.substring(3,6)];
        const zCode = gua.map(y => y.m ? 1-y.t : y.t).join('');
        
        // 1. 动态确定卦名
        const guaName = G64_NAMES[bCode] || (up.n + low.n + "卦");
        document.getElementById('r-name').innerText = guaName;
        document.getElementById('r-sub').innerText = `${up.e}上 / ${low.e}下 | 核心特质：${up.k} + ${low.k}`;

        // 2. 动态生成三才解析 (根据爻的阴阳)
        document.getElementById('sc-g').innerText = (gua[0].t + gua[1].t >= 1) ? "根基稳固" : "基础待建";
        document.getElementById('sc-p').innerText = (gua[2].t + gua[3].t >= 1) ? "人事积极" : "人事被动";
        document.getElementById('sc-t').innerText = (gua[4].t + gua[5].t >= 1) ? "时机成熟" : "静待时机";

        // 3. 动态推演曾师解析 (核心改进)
        let zengLogic = `曾教授常说：‘看卦要看位’。你现在的外部环境是${up.e}，意味着环境表现出${up.k}的特点；而你的内心是${low.e}，代表你当下的心态是${low.k}。`;
        if (up.n === low.n) {
            zengLogic += `内外同气，说明你现在想的和做的一致，但要注意‘过犹不及’，曾师提醒我们要懂得‘度’。`;
        } else {
            zengLogic += `内外不一，这叫‘冲突中求和谐’。曾教授语：‘易经就是处理关系的’。你现在最需要处理好‘${up.a}’与‘${low.a}’之间的平衡。`;
        }
        
        // 特殊卦象深度补充
        if(guaName === "火泽睽") {
            zengLogic += " 睽卦就是‘背道而驰’。曾教授讲：‘睽’不是坏事，它是让你在不同中求大同。你要找那个跟你性格完全相反的人合作，那才是天作之合。";
        }

        document.getElementById('r-zeng').innerText = zengLogic;

        // 4. 动态生成行动建议
        const actions = [
            `• 顺应${up.e}的趋势，重点发挥“${up.a}”的作用。`,
            `• 守住内心的“${low.a}”，这是你立身的根本。`,
            `• 曾师秘籍：先问‘位’对不对，再做‘事’。目前建议以“${low.n === '乾' ? '刚健' : '柔顺'}”的态度去处理当下的矛盾。`
        ];
        document.getElementById('r-action').innerHTML = actions.join('<br>');

        // 5. 变卦逻辑
        const mIdx = gua.map((y,i)=>y.m?i+1:0).filter(v=>v!==0);
        if(mIdx.length > 0) {
            document.getElementById('r-bian-box').style.display = 'block';
            document.getElementById('r-bian-text').innerText = `动爻在第 ${mIdx.join(',')} 爻。局势正在向“${TRI_MAP[zCode.substring(3,6)].e}${TRI_MAP[zCode.substring(0,3)].e}”演变。曾师云：‘变则通’，意味着你现在担心的事会有转折，重点看“${TRI_MAP[zCode.substring(3,6)].a}”。`;
        } else { document.getElementById('r-bian-box').style.display = 'none'; }

        document.getElementById('result-area').style.display = 'block';
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }
</script>
</body>
</html>
