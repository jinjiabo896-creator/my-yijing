<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易智行 10.0 · 曾仕强精准推演版</title>
    <style>
        :root { --paper: #f4f1ea; --ink: #2c2c2c; --gold: #b89b5e; --red: #a22d2d; --jade: #3a5a40; }
        body { background-color: #1a1a1a; color: var(--ink); font-family: 'STKaiti', 'KaiTi', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; text-align: center; padding: 20px 0; border-bottom: 2px solid var(--gold); background: #1a1a1a; }
        header h1 { color: var(--gold); letter-spacing: 5px; margin: 0; font-size: 1.3rem; }
        .container { width: 92%; max-width: 500px; padding: 15px 0 80px; }
        .q-input { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 10px; margin-bottom: 15px; }
        .q-input input { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 1rem; outline: none; text-align: center; }
        .gua-stage { background: #000; padding: 25px; border-radius: 8px; display: flex; flex-direction: column-reverse; gap: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .yao-row { height: 16px; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .yao-label { position: absolute; left: -45px; font-size: 0.75rem; color: #777; }
        .line-body { height: 100%; border-radius: 2px; transition: 0.4s; }
        .yang { width: 100%; background: var(--gold); }
        .yin { width: 100%; display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 44%; height: 100%; background: #444; }
        .moving::after { content: "✕"; position: absolute; right: -30px; color: var(--red); font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: 1px solid var(--gold); background: transparent; color: var(--gold); border-radius: 4px; font-family: inherit; cursor: pointer; }
        .prime { grid-column: span 2; background: var(--gold); color: #000; font-weight: bold; border: none; }
        #result-area { display: none; width: 100%; margin-top: 15px; }
        .paper-scroll { background-color: var(--paper); background-image: radial-gradient(#dcd7c9 1.2px, transparent 1.2px); background-size: 20px 20px; padding: 20px; border: 1px solid #dcd7c9; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .scroll-header { border-bottom: 2px solid var(--ink); margin-bottom: 15px; text-align: center; }
        .scroll-header h2 { margin: 0; font-size: 1.6rem; color: var(--red); letter-spacing: 4px; }
        .stage-box { background: rgba(0,0,0,0.05); padding: 12px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .yao-tabs { display: flex; justify-content: space-between; gap: 4px; margin-top: 8px; }
        .tab { flex: 1; padding: 6px 0; background: #ddd; border-radius: 4px; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .tab.active { background: var(--gold); color: white; }
        .detail-display { background: white; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-top: 10px; font-size: 0.9rem; line-height: 1.6; }
        .detail-display b { display: block; color: var(--red); margin-bottom: 4px; border-bottom: 1px dashed #ddd; }
        .action-card { border: 2px solid var(--jade); background: #fff; padding: 12px; border-radius: 8px; }
        .action-card strong { color: var(--jade); display: block; border-bottom: 1px solid var(--jade); margin-bottom: 8px; font-size: 1rem; }
    </style>
</head>
<body>

<header><h1>易智行 10.0 · 传世智库</h1></header>

<div class="container">
    <div class="q-input"><input type="text" id="question" placeholder="诚心默念具体困惑"></div>
    <div class="gua-stage" id="stage"></div>
    <div class="btn-grid">
        <button onclick="addYao(1)">⚊ 记阳爻</button>
        <button onclick="addYao(0)">⚋ 记阴爻</button>
        <button onclick="markMoving()" style="grid-column: span 2;">标记最后一位为“变爻”</button>
        <button onclick="clearAll()">焚香重起</button>
        <button class="prime" onclick="solve()">深 度 逻辑 推 演</button>
    </div>

    <div id="result-area">
        <div class="paper-scroll">
            <div class="scroll-header"><h2 id="r-name">卦名</h2><div id="r-sub" style="font-size: 0.85rem; margin-top:4px; color:#555;"></div></div>
            <div class="stage-box">
                <h4 style="margin:0; font-size:0.9rem;">【位子点拨】点击查看你在该阶层的实操：</h4>
                <div class="yao-tabs" id="tabContainer">
                    <div class="tab" onclick="updateStageDetail(0)">初阶</div>
                    <div class="tab" onclick="updateStageDetail(1)">二阶</div>
                    <div class="tab" onclick="updateStageDetail(2)">三阶</div>
                    <div class="tab" onclick="updateStageDetail(3)">四阶</div>
                    <div class="tab" onclick="updateStageDetail(4)">五阶</div>
                    <div class="tab" onclick="updateStageDetail(5)">上阶</div>
                </div>
                <div class="detail-display" id="stage-detail"></div>
            </div>
            <div class="action-card">
                <strong>【实战锦囊】</strong>
                <div id="r-action" style="font-size: 0.95rem; line-height:1.7;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let gua = [];
    const TRI_MAP = {
        "111": {n:"乾", e:"天", k:"刚健", l:["潜伏蓄势","崭露头角","忧虑自省","进退抉择","圆满巅峰","高位戒惧"]},
        "000": {n:"坤", e:"地", k:"柔顺", l:["脚踏实地","德厚载物","持守劳顿","追随辅助","黄裳元吉","物极必反"]},
        "100": {n:"震", e:"雷", k:"奋发", l:["雷动起步","震惊自警","苏醒行动","陷入泥沼","往来有序","谨慎收场"]},
        "011": {n:"巽", e:"风", k:"深入", l:["进退犹豫","谦卑受益","频频指令","后悔消失","守正有终","丧失资财"]},
        "010": {n:"坎", e:"水", k:"陷险", l:["陷入口中","求小得小","劳而无功","简约交付","心力交瘁","长久围困"]},
        "101": {n:"离", e:"火", k:"明丽", l:["错步谨慎","黄离元吉","日暮之叹","突如其来","出涕唏嘘","折首获匪"]},
        "001": {n:"艮", e:"山", k:"稳重", l:["止于脚趾","止于小腿","止于腰部","止于躯干","止于言语","敦厚之止"]},
        "110": {n:"兑", e:"泽", k:"喜悦", l:["和悦交流","诚信之悦","目标未达","商谈未决","诚实守信","引诱之悦"]}
    };

    const GUA_DATA = {
        "111111": { name: "乾为天", act: ["此卦全阳，核心在‘动’。","曾师提醒：目前的位子虽高，但容易脱离群众。","实战策略：通过不断地自我学习，保持龙的活力，但要防‘亢’。"] },
        "000000": { name: "坤为地", act: ["此卦全阴，核心在‘静’。","曾师提醒：不要想当老大，当个好帮手你才能成事。","实战策略：像大地一样厚实，忍人所不能忍，后发制人。"] },
        "000110": { name: "地泽临", act: ["临是管理，核心在‘亲’。","曾师提醒：当领导要下基层，不能只听好话。","实战策略：恩威并施，给下属好处（泽）的同时保持大地的威严（坤）。"] },
        "000111": { name: "天地否", act: ["闭塞之局，核心在‘隐’。","曾师提醒：上下不通，别去硬碰硬。","实战策略：内文明而外柔顺。现在是考研德行的时候，守住本心等天亮。"] }
    };

    function addYao(t) { if(gua.length < 6) { gua.push({t, m: false}); render(); } }
    function markMoving() { if(gua.length > 0) { gua[gua.length-1].m = !gua[gua.length-1].m; render(); } }
    function clearAll() { gua = []; render(); document.getElementById('result-area').style.display = 'none'; }

    function render() {
        const stage = document.getElementById('stage'); stage.innerHTML = '';
        const labels = ["初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];
        gua.forEach((y, i) => {
            const row = document.createElement('div');
            row.className = `yao-row ${y.m ? 'moving' : ''}`;
            row.innerHTML = `<div class="yao-label">${labels[i]}</div><div class="line-body ${y.t===1?'yang':'yin'}"></div>`;
            stage.appendChild(row);
        });
    }

    function updateStageDetail(idx) {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, i) => t.className = i === idx ? 'tab active' : 'tab');
        
        const lowCode = gua.map(y=>y.t).join('').substring(0,3);
        const upCode = gua.map(y=>y.t).join('').substring(3,6);
        const low = TRI_MAP[lowCode], up = TRI_MAP[upCode];
        
        const box = document.getElementById('stage-detail');
        let title = ["初阶", "二阶", "三阶", "四阶", "五阶", "上阶"][idx];
        let content = idx < 3 ? low.l[idx] : up.l[idx-3];
        let zengSense = idx === 4 ? "（这是核心领导位）" : (idx === 0 ? "（这是入局潜伏期）" : "");

        box.innerHTML = `<b>${title} · ${content}</b>曾师锦囊：在这个位置，你要发挥“${idx < 3 ? low.k : up.k}”的特质。${zengSense}。如果这一爻是${gua[idx].t === 1 ? '阳爻，代表动力强劲，不可冒进' : '阴爻，代表资源不足，建议守旧'}。`;
    }

    function solve() {
        if(gua.length < 6) return;
        const code = gua.map(y => y.t).join('');
        const low = TRI_MAP[code.substring(0,3)], up = TRI_MAP[code.substring(3,6)];
        
        let hex = GUA_DATA[code] || {
            name: up.n + low.n + "卦",
            act: [`当前是${up.e}下有${low.e}，局势处于错位中。`,`曾师提醒：外在要${up.k}，内在要${low.k}。`,`实战建议：针对当下的困惑，先站稳自己的位子，别乱动。`]
        };

        document.getElementById('r-name').innerText = hex.name;
        document.getElementById('r-sub').innerText = `格局：${up.e}上${low.e}下 · 德行：${up.k} + ${low.k}`;

        const actBox = document.getElementById('r-action');
        actBox.innerHTML = hex.act.map(a => `• ${a}`).join('<br>');

        updateStageDetail(0); 
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }
</script>
</body>
</html>
