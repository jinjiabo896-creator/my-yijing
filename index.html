<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易智行 8.0 · 曾仕强智慧精舍</title>
    <style>
        :root { --gold: #b89b5e; --ink: #1a1a1a; --paper: #f2ede4; --red: #8e2929; --jade: #2e4a3e; }
        body { background-color: #121212; color: #d1d1d1; font-family: 'STKaiti', 'KaiTi', serif; margin: 0; padding: 0; }
        .paper-bg { background-color: var(--paper); background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); color: var(--ink); border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        header { text-align: center; padding: 30px 0; background: #1a1a1a; border-bottom: 1px solid var(--gold); }
        header h1 { color: var(--gold); letter-spacing: 10px; margin: 0; font-size: 1.8rem; }
        .container { width: 92%; max-width: 500px; margin: 0 auto; padding: 20px 0 100px; }
        .q-input { border: 1px solid var(--gold); padding: 15px; margin-bottom: 25px; background: rgba(255,255,255,0.03); }
        .q-input input { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 1.1rem; text-align: center; outline: none; font-family: inherit; }
        .gua-stage { display: flex; flex-direction: column-reverse; gap: 15px; padding: 30px; background: rgba(0,0,0,0.2); border: 1px solid #333; margin-bottom: 25px; }
        .yao-row { height: 18px; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .yao-tag { position: absolute; left: -40px; font-size: 0.7rem; color: #666; }
        .line-body { height: 100%; border-radius: 2px; transition: 0.5s; }
        .yang { width: 100%; background: var(--gold); }
        .yin { width: 100%; display: flex; justify-content: space-between; }
        .yin::before, .yin::after { content: ""; width: 44%; height: 100%; background: #444; }
        .is-moving::after { content: "✕"; position: absolute; right: -30px; color: var(--red); font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 15px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-family: inherit; cursor: pointer; }
        .prime { grid-column: span 2; background: var(--gold); color: #000; font-weight: bold; border: none; }
        #result-area { display: none; margin-top: 30px; }
        .scroll-content { padding: 25px; }
        .scroll-header { border-bottom: 2px solid var(--ink); margin-bottom: 20px; text-align: center; }
        .scroll-header h2 { margin: 0; font-size: 2rem; color: var(--red); letter-spacing: 5px; }
        .sancai-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .sancai-item { border: 1px solid #ccc; padding: 8px; text-align: center; font-size: 0.75rem; }
        .sancai-item b { display: block; color: var(--red); font-size: 0.9rem; }
        .wisdom-card { margin-bottom: 20px; border-left: 4px solid var(--jade); padding-left: 12px; }
        .wisdom-card h4 { margin: 0 0 8px 0; color: var(--jade); font-size: 1rem; }
        .wisdom-card p { margin: 0; line-height: 1.7; text-align: justify; font-size: 0.95rem; }
    </style>
</head>
<body>
<header><h1>易智行 8.0</h1></header>
<div class="container">
    <div class="q-input"><input type="text" id="question" placeholder="诚心默念疑惑，在此落笔"></div>
    <div class="gua-stage" id="stage"></div>
    <div class="btn-grid">
        <button onclick="addYao(1)">⚊ 记阳爻</button>
        <button onclick="addYao(0)">⚋ 记阴爻</button>
        <button onclick="markMoving()" style="grid-column: span 2;">标记此爻为“变爻”</button>
        <button onclick="clearAll()">重置起卦</button>
        <button class="prime" onclick="solve()">开启智慧推演</button>
    </div>
    <div id="result-area">
        <div class="paper-bg scroll-content">
            <div class="scroll-header"><h2 id="r-name">卦名</h2><div id="r-sub" style="font-size: 0.8rem; margin-top:5px;"></div></div>
            <div class="sancai-box">
                <div class="sancai-item"><b>天</b>时位<br><span id="sc-t"></span></div>
                <div class="sancai-item"><b>人</b>人事<br><span id="sc-p"></span></div>
                <div class="sancai-item"><b>地</b>根基<br><span id="sc-g"></span></div>
            </div>
            <div class="wisdom-card" id="r-bian-box" style="display:none; background:rgba(142,41,41,0.05);">
                <h4>【变卦趋势】</h4><p id="r-bian-text"></p>
            </div>
            <div class="wisdom-card"><h4>【曾师实战心法】</h4><p id="r-zeng-main"></p></div>
            <div class="wisdom-card" style="border-color: var(--gold);"><h4>【应对策】</h4><div id="r-steps"></div></div>
        </div>
    </div>
</div>
<script>
    let gua = [];
    const TRI_DATA = {"111":{n:"乾",e:"天",q:"健"},"000":{n:"坤",e:"地",q:"顺"},"100":{n:"震",e:"雷",q:"动"},"011":{n:"巽",e:"风",q:"入"},"010":{n:"坎",e:"水",q:"陷"},"101":{n:"离",e:"火",q:"丽"},"001":{n:"艮",e:"山",q:"止"},"110":{n:"兑",e:"泽",q:"悦"}};
    function addYao(t){ if(gua.length<6){ gua.push({t, m:false}); render(); } }
    function markMoving(){ if(gua.length>0){ gua[gua.length-1].m=!gua[gua.length-1].m; render(); } }
    function clearAll(){ gua=[]; render(); document.getElementById('result-area').style.display='none'; }
    function render(){
        const stage = document.getElementById('stage'); stage.innerHTML = '';
        const labels = ["初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];
        gua.forEach((y,i)=>{
            const row = document.createElement('div'); row.className = `yao-row ${y.m?'is-moving':''}`;
            row.innerHTML = `<div class="yao-tag">${labels[i]}</div><div class="line-body ${y.t===1?'yang':'yin'}"></div>`;
            stage.appendChild(row);
        });
    }
    function getInfo(code){
        const low=TRI_DATA[code.substring(0,3)], up=TRI_DATA[code.substring(3,6)];
        const names={"坤兑":"地泽临","坤乾":"地天泰","乾坤":"天地否","乾乾":"乾为天","坤坤":"坤为地","离坎":"火水未济","坎离":"水火既济"};
        return { name: names[up.n+low.n] || (up.n+low.n), up, low };
    }
    function solve(){
        if(gua.length<6) return;
        const benCode=gua.map(y=>y.t).join(''), ben=getInfo(benCode);
        const zhiCode=gua.map(y=>y.m?1-y.t:y.t).join(''), zhi=getInfo(zhiCode);
        document.getElementById('r-name').innerText = ben.name;
        document.getElementById('r-sub').innerText = `【 ${ben.up.e} / ${ben.low.e} 】`;
        document.getElementById('sc-g').innerText = gua[0].t+gua[1].t>=1?"根基稳":"基不牢";
        document.getElementById('sc-p').innerText = gua[2].t+gua[3].t>=1?"人事兴":"人被动";
        document.getElementById('sc-t').innerText = gua[4].t+gua[5].t>=1?"时机到":"时未至";
        if(benCode!==zhiCode){
            document.getElementById('r-bian-box').style.display='block';
            document.getElementById('r-bian-text').innerText = `由${ben.name}变为${zhi.name}。曾师云：动则变，变则通。重点关注“${zhi.up.e}”带来的后势影响。`;
        }
        document.getElementById('r-zeng-main').innerText = "曾教授心法：位要正，名要顺。你现在的局面，关键看你能不能守住本分，顺应自然规律。";
        document.getElementById('r-steps').innerHTML = "• 守住当前“"+ben.low.e+"”的内在定力。<br>• 应对外在“"+ben.up.e+"”的环境变化。";
        document.getElementById('result-area').style.display='block';
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }
</script>
</body>
</html>
